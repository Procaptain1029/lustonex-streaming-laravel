# Blueprint: Web (Docker) + Postgres + Render Key Value (Redis) + queue worker.
#
# Redis (Key Value): ipAllowList [] = private network only (recommended). Your web
# and worker reach Redis via REDIS_URL on Render's private network.
#
# Set the same APP_KEY on both "streaming-app" and "streaming-queue" (Dashboard
# or env group) so encryption/session stays consistent across processes.

databases:
  - name: streaming-db
    plan: free
    databaseName: streaming
    user: streaming

services:
  - type: keyvalue
    name: streaming-redis
    region: oregon
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: streaming-app
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    disk:
      name: hls-data
      mountPath: /var/www/html/public/hls
      sizeGB: 5
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: RUN_MIGRATIONS
        value: "1"
      - key: CACHE_CONFIG
        value: "0"
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: streaming-db
          property: connectionString
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: streaming-redis
          property: connectionString
      - key: CACHE_DRIVER
        value: redis
      - key: SESSION_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: RTMP_PUBLIC_URL
        sync: false

  - type: worker
    name: streaming-queue
    runtime: docker
    region: oregon
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: CONTAINER_ROLE
        value: worker
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: stderr
      - key: RUN_MIGRATIONS
        value: "0"
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: streaming-db
          property: connectionString
      - key: REDIS_CLIENT
        value: phpredis
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: streaming-redis
          property: connectionString
      - key: CACHE_DRIVER
        value: redis
      - key: QUEUE_CONNECTION
        value: redis
      - key: APP_KEY
        sync: false
